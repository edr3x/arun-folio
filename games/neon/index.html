<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Pulse: Velocity Run</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-purple: #8b00ff;
    --neon-yellow: #ffee00;
    --neon-green: #00ff88;
    --bg-dark: #02020f;
    --bg-mid: #05051a;
    --lane-w: 120px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: none;
  }

  #cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 2px solid var(--neon-cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: background 0.1s;
    box-shadow: 0 0 8px var(--neon-cyan);
  }

  /* SCREEN MANAGEMENT */
  .screen { position: absolute; inset: 0; display: none; }
  .screen.active { display: flex; }

  /* ===================== TITLE SCREEN ===================== */
  #title-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #0a0030 0%, #02020f 70%);
    overflow: hidden;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridScroll 4s linear infinite;
  }

  @keyframes gridScroll {
    0% { transform: perspective(400px) rotateX(60deg) translateY(0); }
    100% { transform: perspective(400px) rotateX(60deg) translateY(60px); }
  }

  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
  }

  .title-content { position: relative; z-index: 2; text-align: center; }

  .game-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 900;
    line-height: 1;
    color: #fff;
    text-shadow:
      0 0 20px var(--neon-cyan),
      0 0 40px var(--neon-cyan),
      0 0 80px rgba(0,245,255,0.4);
    animation: titlePulse 2s ease-in-out infinite;
    letter-spacing: 4px;
  }

  .title-sub {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.7rem, 2vw, 1.1rem);
    color: var(--neon-pink);
    letter-spacing: 12px;
    margin-top: 8px;
    text-shadow: 0 0 15px var(--neon-pink);
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 80px rgba(0,245,255,0.4); }
    50% { text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-cyan), 0 0 120px rgba(0,245,255,0.6); }
  }

  .char-select {
    display: flex;
    gap: 20px;
    margin: 40px 0 30px;
    justify-content: center;
  }

  .char-card {
    width: 90px;
    background: rgba(0,245,255,0.05);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 8px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .char-card:hover, .char-card.selected {
    border-color: var(--neon-cyan);
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 20px rgba(0,245,255,0.3), inset 0 0 20px rgba(0,245,255,0.05);
    transform: translateY(-4px);
  }

  .char-icon { font-size: 2rem; margin-bottom: 6px; }
  .char-name { font-family: 'Orbitron', sans-serif; font-size: 0.55rem; color: var(--neon-cyan); letter-spacing: 1px; }
  .char-trait { font-size: 0.6rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

  .start-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 16px 50px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    text-shadow: 0 0 10px var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.2), inset 0 0 20px rgba(0,245,255,0.05);
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--neon-cyan);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
  }

  .start-btn:hover::before { transform: translateX(0); }
  .start-btn:hover { color: #000; text-shadow: none; }

  .controls-hint {
    margin-top: 20px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }

  .controls-hint span { color: var(--neon-yellow); }

  /* Floating particles on title */
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px); opacity: 0; }
  }

  /* ===================== GAME SCREEN ===================== */
  #game-screen {
    flex-direction: column;
    background: #02020f;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
  }

  .hud-score {
    font-family: 'Orbitron', sans-serif;
    color: #fff;
  }

  .hud-score .score-val {
    font-size: 2rem;
    font-weight: 900;
    text-shadow: 0 0 15px var(--neon-cyan);
    color: var(--neon-cyan);
    line-height: 1;
  }

  .hud-score .score-label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
  }

  .hud-center {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
  }

  .combo-display {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--neon-yellow);
    text-shadow: 0 0 15px var(--neon-yellow);
    transition: all 0.1s;
    min-height: 40px;
    line-height: 40px;
  }

  .combo-display.pop {
    animation: comboPop 0.3s ease-out;
  }

  @keyframes comboPop {
    0% { transform: scale(1.5); }
    100% { transform: scale(1); }
  }

  .dist-display {
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
  }

  .hud-right { text-align: right; font-family: 'Orbitron', sans-serif; }

  .boost-bar-wrap { margin-bottom: 8px; }
  .boost-label { font-size: 0.55rem; letter-spacing: 2px; color: var(--neon-pink); margin-bottom: 4px; }
  .boost-bar {
    width: 120px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-left: auto;
  }
  .boost-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
    border-radius: 3px;
    width: 100%;
    box-shadow: 0 0 8px var(--neon-pink);
    transition: width 0.1s;
  }

  .lives { display: flex; gap: 6px; justify-content: flex-end; }
  .life-icon { font-size: 1rem; transition: all 0.3s; }
  .life-icon.lost { opacity: 0.2; filter: grayscale(1); }

  /* CANVAS */
  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Power-up indicators */
  #powerup-display {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  .pu-slot {
    width: 50px; height: 50px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    position: relative;
    transition: all 0.2s;
  }

  .pu-slot.active {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0,245,255,0.4);
  }

  .pu-timer {
    position: absolute;
    bottom: 2px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.45rem;
    color: var(--neon-cyan);
  }

  /* PAUSE / OVERLAY */
  #pause-overlay {
    position: absolute;
    inset: 0;
    background: rgba(2,2,15,0.9);
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
  }

  #pause-overlay.visible { display: flex; }

  .pause-title {
    font-size: 3rem;
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: 0 0 30px var(--neon-cyan);
    margin-bottom: 40px;
    letter-spacing: 6px;
  }

  .menu-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    padding: 14px 40px;
    margin: 8px;
    background: transparent;
    border: 1px solid rgba(0,245,255,0.4);
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    transition: all 0.2s;
    min-width: 220px;
  }

  .menu-btn:hover {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    background: rgba(0,245,255,0.08);
    box-shadow: 0 0 20px rgba(0,245,255,0.2);
  }

  /* GAME OVER */
  #gameover-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a0010 0%, #02020f 70%);
    z-index: 300;
  }

  .go-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    color: var(--neon-pink);
    text-shadow: 0 0 30px var(--neon-pink), 0 0 60px var(--neon-pink);
    letter-spacing: 6px;
    margin-bottom: 30px;
    animation: glitch 2s infinite;
  }

  @keyframes glitch {
    0%, 90%, 100% { transform: none; }
    92% { transform: translateX(-4px) skewX(-2deg); clip-path: inset(20% 0 60% 0); }
    94% { transform: translateX(4px) skewX(2deg); clip-path: inset(60% 0 20% 0); }
    96% { transform: translateX(-2px); clip-path: none; }
  }

  .go-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 20px 0 40px;
    text-align: center;
  }

  .go-stat {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 16px 30px;
  }

  .go-stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
  }

  .go-stat-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }

  .go-new-best {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 4px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
    margin-bottom: 20px;
    animation: blink 1s ease-in-out infinite;
    min-height: 24px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* DIMENSION SHIFT FLASH */
  #dim-flash {
    position: absolute;
    inset: 0;
    background: var(--neon-purple);
    opacity: 0;
    z-index: 150;
    pointer-events: none;
    transition: opacity 0.1s;
  }

  /* SPEED LINES */
  #speed-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* Mission banner */
  #mission-banner {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--neon-green);
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.3);
    padding: 8px 20px;
    border-radius: 4px;
    text-shadow: 0 0 10px var(--neon-green);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
    text-align: center;
    white-space: nowrap;
  }

  #mission-banner.show { opacity: 1; }

  /* DIMENSION indicator */
  #dim-indicator {
    position: absolute;
    top: 75px;
    right: 24px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 2px;
    z-index: 100;
    padding: 6px 12px;
    border-radius: 4px;
    transition: all 0.3s;
  }

  #dim-indicator.normal {
    color: var(--neon-cyan);
    border: 1px solid rgba(0,245,255,0.3);
    background: rgba(0,245,255,0.05);
  }

  #dim-indicator.neon-grid {
    color: var(--neon-purple);
    border: 1px solid rgba(139,0,255,0.6);
    background: rgba(139,0,255,0.1);
    box-shadow: 0 0 15px rgba(139,0,255,0.3);
    animation: dimPulse 0.5s ease-in-out infinite;
  }

  @keyframes dimPulse {
    0%, 100% { box-shadow: 0 0 15px rgba(139,0,255,0.3); }
    50% { box-shadow: 0 0 25px rgba(139,0,255,0.6); }
  }
</style>
</head>
<body>

<div id="cursor"></div>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <div class="title-content">
    <div class="game-title">NEON PULSE</div>
    <div class="title-sub">VELOCITY RUN</div>

    <div class="char-select">
      <div class="char-card selected" data-char="0" onclick="selectChar(0)">
        <div class="char-icon">⚡</div>
        <div class="char-name">KAIRO</div>
        <div class="char-trait">Speed Burst</div>
      </div>
      <div class="char-card" data-char="1" onclick="selectChar(1)">
        <div class="char-icon">🗡️</div>
        <div class="char-name">CIPHER</div>
        <div class="char-trait">Phase Through</div>
      </div>
      <div class="char-card" data-char="2" onclick="selectChar(2)">
        <div class="char-icon">👾</div>
        <div class="char-name">ECHO</div>
        <div class="char-trait">Clone Runner</div>
      </div>
      <div class="char-card" data-char="3" onclick="selectChar(3)">
        <div class="char-icon">💃</div>
        <div class="char-name">LYRA</div>
        <div class="char-trait">Gravity Flip</div>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">START RUN</button>
    <div class="controls-hint">
      <span>← →</span> LANE SHIFT &nbsp;|&nbsp; <span>↑</span> JUMP &nbsp;|&nbsp; <span>↓</span> SLIDE &nbsp;|&nbsp; <span>SPACE</span> DIMENSION SHIFT
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-score">
      <div class="score-label">SCORE</div>
      <div class="score-val" id="hud-score">0</div>
    </div>
    <div class="hud-center">
      <div class="combo-display" id="combo-display"></div>
      <div class="dist-display" id="dist-display">0 M</div>
    </div>
    <div class="hud-right">
      <div class="boost-bar-wrap">
        <div class="boost-label">BOOST</div>
        <div class="boost-bar"><div class="boost-fill" id="boost-fill"></div></div>
      </div>
      <div class="lives" id="lives-display">
        <span class="life-icon">❤️</span>
        <span class="life-icon">❤️</span>
        <span class="life-icon">❤️</span>
      </div>
    </div>
  </div>

  <div id="dim-indicator" class="normal">◈ CITY GRID</div>
  <div id="mission-banner"></div>
  <div id="dim-flash"></div>
  <div id="speed-overlay"></div>

  <div id="powerup-display">
    <div class="pu-slot" id="pu-magnet"><div>🧲</div><div class="pu-timer" id="pu-magnet-t"></div></div>
    <div class="pu-slot" id="pu-phase"><div>💠</div><div class="pu-timer" id="pu-phase-t"></div></div>
    <div class="pu-slot" id="pu-clock"><div>⏱</div><div class="pu-timer" id="pu-clock-t"></div></div>
  </div>

  <div id="pause-overlay">
    <div class="pause-title">PAUSED</div>
    <button class="menu-btn" onclick="resumeGame()">▶ RESUME</button>
    <button class="menu-btn" onclick="goToTitle()">⌂ MAIN MENU</button>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen" class="screen">
  <div class="go-title">SYSTEM CRASH</div>
  <div class="go-new-best" id="go-best-label"></div>
  <div class="go-stats">
    <div class="go-stat">
      <div class="go-stat-val" id="go-score">0</div>
      <div class="go-stat-label">FINAL SCORE</div>
    </div>
    <div class="go-stat">
      <div class="go-stat-val" id="go-dist">0M</div>
      <div class="go-stat-label">DISTANCE</div>
    </div>
    <div class="go-stat">
      <div class="go-stat-val" id="go-combo">0x</div>
      <div class="go-stat-label">MAX COMBO</div>
    </div>
    <div class="go-stat">
      <div class="go-stat-val" id="go-credits">0</div>
      <div class="go-stat-label">CREDITS</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">RUN AGAIN</button>
  <br><br>
  <button class="menu-btn" onclick="goToTitle()">⌂ MAIN MENU</button>
</div>

<script>
// ============================================================
// CURSOR
// ============================================================
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

// ============================================================
// TITLE PARTICLES
// ============================================================
const titleScreen = document.getElementById('title-screen');
const colors = ['#00f5ff','#ff006e','#8b00ff','#ffee00','#00ff88'];
for(let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random()*100}%;
    background: ${colors[Math.floor(Math.random()*colors.length)]};
    animation-duration: ${3+Math.random()*6}s;
    animation-delay: ${Math.random()*5}s;
    box-shadow: 0 0 6px currentColor;
    width: ${1+Math.random()*3}px;
    height: ${1+Math.random()*3}px;
  `;
  titleScreen.appendChild(p);
}

// ============================================================
// CHAR SELECT
// ============================================================
let selectedChar = 0;
const charData = [
  { name:'Kairo', icon:'⚡', color:'#00f5ff' },
  { name:'Cipher', icon:'🗡️', color:'#ff006e' },
  { name:'Echo', icon:'👾', color:'#8b00ff' },
  { name:'Lyra', icon:'💃', color:'#ffee00' }
];

function selectChar(i) {
  selectedChar = i;
  document.querySelectorAll('.char-card').forEach((c,j)=> {
    c.classList.toggle('selected', j===i);
  });
}

// ============================================================
// SCREENS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToTitle() {
  cancelAnimationFrame(rafId);
  showScreen('title-screen');
}

// ============================================================
// GAME ENGINE
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, rafId;
let gameState = {};

const LANES = 3;
const LANE_WIDTH = 120;
const BASE_SPEED = 3;
const MAX_SPEED = 18;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  W = canvas.width;
  H = canvas.height;
}
window.addEventListener('resize', resize);
resize();

function laneX(lane) {
  const totalW = LANES * LANE_WIDTH;
  const startX = (W - totalW) / 2 + LANE_WIDTH / 2;
  return startX + lane * LANE_WIDTH;
}

function initGame() {
  gameState = {
    score: 0,
    distance: 0,
    credits: 0,
    combo: 1,
    maxCombo: 1,
    lives: 3,
    lane: 1,
    targetLane: 1,
    laneX: laneX(1),
    speed: BASE_SPEED,
    playerY: 0,
    velY: 0,
    isJumping: false,
    isSliding: false,
    slideTimer: 0,
    invincible: false,
    invincibleTimer: 0,
    phaseActive: false,
    phaseTimer: 0,
    magnetActive: false,
    magnetTimer: 0,
    clockActive: false,
    clockTimer: 0,
    boostMeter: 100,
    inNeonGrid: false,
    neonGridTimer: 0,
    obstacles: [],
    coins: [],
    particles: [],
    powerups: [],
    bgLines: [],
    buildings: [],
    frameCount: 0,
    running: true,
    paused: false,
    spawnTimer: 0,
    coinSpawnTimer: 0,
    puSpawnTimer: 0,
    comboResetTimer: 0,
    difficultyFactor: 1,
    missionText: '',
    missionTimer: 0,
    missions: [
      {text:'COLLECT 5 CREDITS IN A ROW', done:false},
      {text:'HIT 5x COMBO MULTIPLIER', done:false},
      {text:'SURVIVE 500M', done:false},
    ],
    currentMission: 0,
    consecutiveCredits: 0,
    lastHp: 3,
    char: charData[selectedChar],
    bestScore: parseInt(localStorage.getItem('neonBest')||'0'),
  };

  // Init buildings
  for(let i=0; i<10; i++) {
    gameState.buildings.push({
      x: Math.random()*W,
      y: Math.random()*H*0.5,
      w: 40+Math.random()*80,
      h: 80+Math.random()*200,
      color: colors[Math.floor(Math.random()*colors.length)],
      speed: 1+Math.random()*2
    });
  }

  // init bg lines
  for(let i=0; i<20; i++) {
    gameState.bgLines.push({
      y: Math.random()*H,
      speed: 2+Math.random()*4,
      w: 100+Math.random()*200,
      opacity: 0.1+Math.random()*0.2
    });
  }

  updateHud();
  document.getElementById('pause-overlay').classList.remove('visible');
}

function startGame() {
  showScreen('game-screen');
  initGame();
  cancelAnimationFrame(rafId);
  loop();
}

function resumeGame() {
  if(!gameState.running) return;
  gameState.paused = false;
  document.getElementById('pause-overlay').classList.remove('visible');
  loop();
}

// INPUT
const keys = {};
let tapStart = null;

document.addEventListener('keydown', e => {
  if(!gameState || !gameState.running) return;
  if(e.key==='Escape' || e.key==='p') togglePause();
  if(gameState.paused) return;
  if(e.key==='ArrowLeft') moveLane(-1);
  if(e.key==='ArrowRight') moveLane(1);
  if(e.key==='ArrowUp' || e.key===' ') {
    if(e.key===' ') toggleNeonGrid();
    else jump();
    e.preventDefault();
  }
  if(e.key==='ArrowDown') slide();
});

// Touch / swipe
canvas.addEventListener('touchstart', e => {
  tapStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  e.preventDefault();
}, {passive:false});

canvas.addEventListener('touchend', e => {
  if(!tapStart) return;
  const dx = e.changedTouches[0].clientX - tapStart.x;
  const dy = e.changedTouches[0].clientY - tapStart.y;
  if(Math.abs(dx)>Math.abs(dy)) {
    if(dx>30) moveLane(1); else if(dx<-30) moveLane(-1);
  } else {
    if(dy<-30) jump(); else if(dy>30) slide();
    else toggleNeonGrid();
  }
  tapStart=null;
  e.preventDefault();
}, {passive:false});

function togglePause() {
  if(!gameState.running) return;
  gameState.paused = !gameState.paused;
  if(gameState.paused) {
    cancelAnimationFrame(rafId);
    document.getElementById('pause-overlay').classList.add('visible');
  } else {
    document.getElementById('pause-overlay').classList.remove('visible');
    loop();
  }
}

function moveLane(dir) {
  const newLane = Math.max(0, Math.min(LANES-1, gameState.targetLane + dir));
  gameState.targetLane = newLane;
}

function jump() {
  if(gameState.isJumping) return;
  gameState.isJumping = true;
  gameState.velY = -18;
  spawnParticles(gameState.laneX, H-100, '#00f5ff', 6);
}

function slide() {
  if(gameState.isSliding) return;
  gameState.isSliding = true;
  gameState.slideTimer = 60;
}

function toggleNeonGrid() {
  if(gameState.inNeonGrid) return;
  gameState.inNeonGrid = true;
  gameState.neonGridTimer = 300;
  flashScreen('#8b00ff', 0.4);
  updateDimIndicator();
}

function flashScreen(color, alpha) {
  const el = document.getElementById('dim-flash');
  el.style.background = color;
  el.style.opacity = alpha;
  setTimeout(()=> el.style.opacity=0, 150);
}

function updateDimIndicator() {
  const el = document.getElementById('dim-indicator');
  if(gameState.inNeonGrid) {
    el.className = 'neon-grid';
    el.textContent = '⬡ NEON GRID';
  } else {
    el.className = 'normal';
    el.textContent = '◈ CITY GRID';
  }
}

// SPAWN
// ============================================================
const OBSTACLE_TYPES = [
  {type:'hover', w:60, h:30, color:'#ff4444', label:'🚗'},
  {type:'drone', w:40, h:40, color:'#ff006e', label:'🤖'},
  {type:'barrier', w:90, h:50, color:'#ff8800', label:'🚧'},
  {type:'laser', w:10, h:100, color:'#ff0066', label:'|', isLaser:true},
  {type:'crate', w:50, h:50, color:'#8844aa', label:'📦'},
];

function spawnObstacle() {
  const lane = Math.floor(Math.random()*LANES);
  const tp = OBSTACLE_TYPES[Math.floor(Math.random()*OBSTACLE_TYPES.length)];
  const mustJump = Math.random()<0.4;
  gameState.obstacles.push({
    lane, x: laneX(lane),
    y: -80,
    w: tp.w, h: tp.h,
    color: tp.color,
    label: tp.label,
    mustJump: mustJump,
    isLaser: tp.isLaser||false,
    speed: gameState.speed * (gameState.clockActive? 0.4 : 1)
  });
}

function spawnCoin() {
  const lane = Math.floor(Math.random()*LANES);
  const count = 1+Math.floor(Math.random()*4);
  for(let i=0;i<count;i++) {
    gameState.coins.push({
      lane, x:laneX(lane), y:-60-i*50,
      r:10, collected:false,
      color: gameState.inNeonGrid ? '#8b00ff' : '#ffee00',
      val: gameState.inNeonGrid ? 5 : 1
    });
  }
}

function spawnPowerup() {
  const lane = Math.floor(Math.random()*LANES);
  const types = ['magnet','phase','clock'];
  const type = types[Math.floor(Math.random()*types.length)];
  const icons = {magnet:'🧲', phase:'💠', clock:'⏱'};
  gameState.powerups.push({
    lane, x:laneX(lane), y:-60,
    r:18, type, icon:icons[type]
  });
}

function spawnParticles(x, y, color, n) {
  for(let i=0;i<n;i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 2+Math.random()*5;
    gameState.particles.push({
      x, y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
      color, life:1, r:2+Math.random()*3
    });
  }
}

// ============================================================
// UPDATE
// ============================================================
function update() {
  const gs = gameState;
  if(!gs.running || gs.paused) return;

  gs.frameCount++;
  gs.distance += gs.speed * 0.01;
  gs.score += Math.floor(gs.combo * gs.speed * 0.05);

  // Speed ramp
  gs.speed = Math.min(MAX_SPEED, BASE_SPEED + gs.distance*0.04);
  gs.difficultyFactor = gs.speed / BASE_SPEED;

  // Lane lerp
  const targetX = laneX(gs.targetLane);
  gs.laneX += (targetX - gs.laneX) * 0.18;

  // Jump physics
  const groundY = H - 140;
  if(gs.isJumping) {
    gs.velY += 0.9;
    gs.playerY += gs.velY;
    if(gs.playerY >= 0) {
      gs.playerY = 0;
      gs.velY = 0;
      gs.isJumping = false;
    }
  }

  // Slide
  if(gs.isSliding) {
    gs.slideTimer--;
    if(gs.slideTimer<=0) gs.isSliding=false;
  }

  // Neon grid timer
  if(gs.inNeonGrid) {
    gs.neonGridTimer--;
    if(gs.neonGridTimer<=0) {
      gs.inNeonGrid=false;
      flashScreen('#00f5ff', 0.3);
      updateDimIndicator();
    }
  }

  // Invincibility
  if(gs.invincible) {
    gs.invincibleTimer--;
    if(gs.invincibleTimer<=0) gs.invincible=false;
  }

  // Power-up timers
  if(gs.phaseActive) { gs.phaseTimer--; if(gs.phaseTimer<=0) gs.phaseActive=false; }
  if(gs.magnetActive) { gs.magnetTimer--; if(gs.magnetTimer<=0) gs.magnetActive=false; }
  if(gs.clockActive) { gs.clockTimer--; if(gs.clockTimer<=0) gs.clockActive=false; }

  // Boost meter
  gs.boostMeter = Math.min(100, gs.boostMeter + 0.1);
  if(gs.inNeonGrid) gs.boostMeter = Math.max(0, gs.boostMeter - 0.5);

  // Combo reset
  gs.comboResetTimer--;
  if(gs.comboResetTimer<=0) {
    gs.combo = Math.max(1, gs.combo-1);
  }

  // Spawning
  const spawnRate = Math.max(30, 80 - gs.difficultyFactor*10);
  gs.spawnTimer++;
  if(gs.spawnTimer>spawnRate) {
    gs.spawnTimer=0;
    // Don't spawn on same lane if possible
    spawnObstacle();
    if(Math.random()<0.4) spawnObstacle();
  }

  gs.coinSpawnTimer++;
  if(gs.coinSpawnTimer>40) { gs.coinSpawnTimer=0; spawnCoin(); }

  gs.puSpawnTimer++;
  if(gs.puSpawnTimer>300) { gs.puSpawnTimer=0; spawnPowerup(); }

  const speedMult = gs.clockActive ? 0.4 : 1;

  // Move obstacles
  gs.obstacles.forEach(ob => {
    ob.y += gs.speed * speedMult;
    ob.x = laneX(ob.lane); // snap to lane in case of resize
  });
  gs.obstacles = gs.obstacles.filter(ob => ob.y < H+100);

  // Move coins
  gs.coins.forEach(c => {
    c.y += gs.speed * speedMult;
    if(gs.magnetActive) {
      const dx = gs.laneX - c.x;
      const dy = (groundY + gs.playerY) - c.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if(d<200) { c.x += dx*0.1; c.y += dy*0.1; }
    }
  });
  gs.coins = gs.coins.filter(c => c.y < H+50 && !c.collected);

  // Move powerups
  gs.powerups.forEach(p => p.y += gs.speed * speedMult);
  gs.powerups = gs.powerups.filter(p => p.y < H+50);

  // Particles
  gs.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.life -= 0.03;
  });
  gs.particles = gs.particles.filter(p => p.life>0);

  // Buildings scroll
  gs.buildings.forEach(b => {
    b.y += b.speed * 0.5;
    if(b.y > H) b.y = -b.h;
  });

  // BG lines
  gs.bgLines.forEach(l => {
    l.y += l.speed;
    if(l.y > H) l.y = -10;
  });

  // Collision - player hitbox
  const px = gs.laneX;
  const py = groundY + gs.playerY;
  const playerH = gs.isSliding ? 20 : 50;
  const playerW = 30;

  // Obstacle collision
  if(!gs.invincible && !gs.phaseActive) {
    for(let ob of gs.obstacles) {
      const obX = ob.x;
      const obTop = ob.y - ob.h;
      const obBot = ob.y;

      const overlapX = Math.abs(px - obX) < (playerW/2 + ob.w/2 - 10);
      const overlapY = py > obTop && (py - playerH) < obBot;

      if(overlapX && overlapY) {
        // Check if jump clears
        if(ob.mustJump && gs.playerY < -20) continue;
        // Check slide
        if(ob.h < 35 && gs.isSliding) continue;

        // HIT
        gs.lives--;
        gs.combo = 1;
        gs.consecutiveCredits = 0;
        gs.invincible = true;
        gs.invincibleTimer = 90;
        spawnParticles(px, py, '#ff006e', 15);
        flashScreen('#ff006e', 0.3);
        updateLivesHud();

        // Remove obstacle
        ob.y = H+200;

        if(gs.lives<=0) {
          endGame();
          return;
        }
        break;
      }
    }
  }

  // Coin collection
  gs.coins.forEach(c => {
    if(c.collected) return;
    const dx = px - c.x, dy = py - c.y;
    if(Math.sqrt(dx*dx+dy*dy) < 30) {
      c.collected = true;
      gs.credits += c.val;
      gs.score += 10 * gs.combo;
      gs.consecutiveCredits++;
      gs.combo = Math.min(20, gs.combo+0.5);
      gs.comboResetTimer = 120;
      gs.maxCombo = Math.max(gs.maxCombo, Math.floor(gs.combo));
      spawnParticles(c.x, c.y, '#ffee00', 4);
    }
  });

  // Powerup collection
  gs.powerups.forEach(p => {
    const dx = px - p.x, dy = py - p.y;
    if(Math.sqrt(dx*dx+dy*dy) < 35) {
      p.y = H+200;
      activatePowerup(p.type);
    }
  });

  // Mission check
  checkMissions();

  updateHud();
}

function activatePowerup(type) {
  const gs = gameState;
  spawnParticles(gs.laneX, H-140 + gs.playerY, '#00f5ff', 10);
  if(type==='magnet') { gs.magnetActive=true; gs.magnetTimer=300; }
  if(type==='phase') { gs.phaseActive=true; gs.phaseTimer=200; }
  if(type==='clock') { gs.clockActive=true; gs.clockTimer=240; }
}

function checkMissions() {
  const gs = gameState;
  if(gs.currentMission>=gs.missions.length) return;
  const m = gs.missions[gs.currentMission];
  let done = false;
  if(gs.currentMission===0 && gs.consecutiveCredits>=5) done=true;
  if(gs.currentMission===1 && gs.combo>=5) done=true;
  if(gs.currentMission===2 && gs.distance>=500) done=true;
  if(done) {
    gs.score += 500;
    gs.currentMission++;
    showMission('MISSION COMPLETE! +500 SCORE');
  }
}

function showMission(text) {
  const el = document.getElementById('mission-banner');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(gameState._missionTimeout);
  gameState._missionTimeout = setTimeout(()=> el.classList.remove('show'), 3000);
}

function updateHud() {
  const gs = gameState;
  document.getElementById('hud-score').textContent = gs.score.toLocaleString();
  document.getElementById('dist-display').textContent = Math.floor(gs.distance) + ' M';

  const comboEl = document.getElementById('combo-display');
  if(gs.combo>1) {
    comboEl.textContent = 'x' + gs.combo.toFixed(1) + ' COMBO';
    comboEl.classList.add('pop');
    setTimeout(()=>comboEl.classList.remove('pop'),300);
  } else {
    comboEl.textContent='';
  }

  // boost
  document.getElementById('boost-fill').style.width = gs.boostMeter+'%';

  // powerup slots
  const slots = {
    magnet: [document.getElementById('pu-magnet'), document.getElementById('pu-magnet-t'), gs.magnetActive, gs.magnetTimer],
    phase: [document.getElementById('pu-phase'), document.getElementById('pu-phase-t'), gs.phaseActive, gs.phaseTimer],
    clock: [document.getElementById('pu-clock'), document.getElementById('pu-clock-t'), gs.clockActive, gs.clockTimer],
  };
  for(const [, [slot, timer, active, t]] of Object.entries(slots).map(([k,v])=>[k,v])) {
    slot.classList.toggle('active', active);
    timer.textContent = active ? Math.ceil(t/60)+'s' : '';
  }
}

function updateLivesHud() {
  const hearts = document.querySelectorAll('.life-icon');
  hearts.forEach((h,i)=> h.classList.toggle('lost', i>=gameState.lives));
}

// ============================================================
// DRAW
// ============================================================
function draw() {
  const gs = gameState;
  ctx.clearRect(0,0,W,H);

  // BG gradient
  const bgGrad = ctx.createLinearGradient(0,0,0,H);
  if(gs.inNeonGrid) {
    bgGrad.addColorStop(0,'#0a0020');
    bgGrad.addColorStop(1,'#1a0040');
  } else {
    bgGrad.addColorStop(0,'#020215');
    bgGrad.addColorStop(1,'#050510');
  }
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  // Buildings silhouette
  ctx.save();
  gs.buildings.forEach(b => {
    const alpha = gs.inNeonGrid ? 0.3 : 0.15;
    ctx.fillStyle = b.color.replace(')',`,${alpha})`).replace('rgb','rgba').replace('#','rgba(').replace(')',')');
    // simple hex to rgba
    ctx.fillStyle = hexToRgba(b.color, alpha);
    ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    // neon window dots
    for(let wy=b.y+10; wy<b.y+b.h-10; wy+=20) {
      for(let wx=b.x-b.w/2+10; wx<b.x+b.w/2-10; wx+=18) {
        if(Math.random()<0.3) {
          ctx.fillStyle = b.color+'aa';
          ctx.fillRect(wx,wy,4,4);
        }
      }
    }
  });
  ctx.restore();

  // BG speed lines
  ctx.save();
  gs.bgLines.forEach(l => {
    ctx.strokeStyle = `rgba(0,245,255,${l.opacity})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, l.y);
    ctx.lineTo(l.w, l.y);
    ctx.stroke();
    // right side
    ctx.beginPath();
    ctx.moveTo(W, l.y);
    ctx.lineTo(W-l.w, l.y);
    ctx.stroke();
  });
  ctx.restore();

  // Track / lanes
  drawTrack();

  // Coins
  gs.coins.forEach(c => {
    if(c.collected) return;
    ctx.save();
    const pulse = 0.8 + 0.2*Math.sin(gs.frameCount*0.1+c.x);
    ctx.shadowColor = c.color;
    ctx.shadowBlur = 15*pulse;
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r*pulse, 0, Math.PI*2);
    ctx.fill();
    // inner shine
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(c.x-3, c.y-3, c.r*0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Powerups
  gs.powerups.forEach(p => {
    ctx.save();
    const pulse = 1+0.1*Math.sin(gs.frameCount*0.08+p.x);
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(0,245,255,0.15)';
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*pulse, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.font = `${p.r*1.2}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.icon, p.x, p.y);
    ctx.restore();
  });

  // Obstacles
  gs.obstacles.forEach(ob => {
    ctx.save();
    if(gs.phaseActive) ctx.globalAlpha=0.4;
    ctx.shadowColor = ob.color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = ob.color+'33';
    ctx.strokeStyle = ob.color;
    ctx.lineWidth = 2;
    const x = ob.x - ob.w/2;
    const y = ob.y - ob.h;
    if(ob.isLaser) {
      // Laser beam
      const gradient = ctx.createLinearGradient(ob.x,y,ob.x,ob.y);
      gradient.addColorStop(0,'transparent');
      gradient.addColorStop(0.5,ob.color);
      gradient.addColorStop(1,'transparent');
      ctx.strokeStyle = gradient;
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(ob.x,y); ctx.lineTo(ob.x,ob.y); ctx.stroke();
      // laser glow
      ctx.shadowBlur=30;
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(ob.x,y); ctx.lineTo(ob.x,ob.y); ctx.stroke();
    } else {
      ctx.fillRect(x,y,ob.w,ob.h);
      ctx.strokeRect(x,y,ob.w,ob.h);
      ctx.font='20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff'; ctx.globalAlpha= gs.phaseActive?0.4:1;
      ctx.fillText(ob.label, ob.x, ob.y - ob.h/2);
    }
    ctx.restore();
  });

  // Player
  drawPlayer();

  // Particles
  gs.particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Neon grid overlay
  if(gs.inNeonGrid) {
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle='#8b00ff';
    ctx.lineWidth=1;
    for(let x=0;x<W;x+=40) {
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
    }
    for(let y=0;y<H;y+=40) {
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    }
    ctx.restore();
  }

  // Speed lines when fast
  if(gs.speed > 12) {
    ctx.save();
    const alpha = (gs.speed-12)/MAX_SPEED * 0.15;
    ctx.globalAlpha=alpha;
    for(let i=0;i<20;i++) {
      const x = Math.random()*W;
      const y = Math.random()*H;
      const len = 20+Math.random()*60;
      ctx.strokeStyle='#fff';
      ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+len);ctx.stroke();
    }
    ctx.restore();
  }
}

function drawTrack() {
  const gs = gameState;
  const groundY = H - 100;
  const trackW = LANES*LANE_WIDTH + 40;
  const trackX = (W-trackW)/2;

  // Track floor
  const floorGrad = ctx.createLinearGradient(0, groundY, 0, H);
  if(gs.inNeonGrid) {
    floorGrad.addColorStop(0,'rgba(139,0,255,0.3)');
    floorGrad.addColorStop(1,'rgba(60,0,120,0.6)');
  } else {
    floorGrad.addColorStop(0,'rgba(0,100,150,0.2)');
    floorGrad.addColorStop(1,'rgba(0,50,100,0.5)');
  }
  ctx.fillStyle = floorGrad;
  ctx.fillRect(trackX, groundY, trackW, H-groundY);

  // Lane dividers (animated)
  const laneColor = gs.inNeonGrid ? '#8b00ff' : '#00f5ff';
  for(let i=0; i<=LANES; i++) {
    const x = trackX + i*LANE_WIDTH + (i===0?20:0);
    const dashOffset = (gs.frameCount * gs.speed * 0.2) % 40;
    ctx.save();
    ctx.strokeStyle = laneColor;
    ctx.lineWidth = i===0||i===LANES ? 2 : 1;
    ctx.globalAlpha = i===0||i===LANES ? 0.6 : 0.3;
    ctx.shadowColor = laneColor;
    ctx.shadowBlur = i===0||i===LANES ? 10 : 5;
    ctx.setLineDash([20,20]);
    ctx.lineDashOffset = -dashOffset;
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.stroke();
    ctx.restore();
  }

  // Ground glow
  ctx.save();
  ctx.shadowColor = laneColor;
  ctx.shadowBlur = 20;
  ctx.strokeStyle = laneColor;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(trackX, groundY);
  ctx.lineTo(trackX+trackW, groundY);
  ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  const gs = gameState;
  const groundY = H - 140;
  const px = gs.laneX;
  const py = groundY + gs.playerY;
  const char = gs.char;

  ctx.save();

  // Invincibility flicker
  if(gs.invincible && Math.floor(gs.frameCount/5)%2===0) {
    ctx.globalAlpha=0.5;
  }

  // Phase effect
  if(gs.phaseActive) {
    ctx.globalAlpha=0.6;
    ctx.shadowColor='#00f5ff';
    ctx.shadowBlur=30;
  }

  // Hover trail
  if(!gs.isJumping) {
    for(let i=1;i<=5;i++) {
      ctx.save();
      ctx.globalAlpha=0.1*i/5;
      ctx.fillStyle=char.color;
      const trailY = py + i*8;
      ctx.beginPath();
      ctx.ellipse(px, trailY+25, 20, 5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Body
  const bodyH = gs.isSliding ? 20 : 50;
  const bodyY = gs.isSliding ? py-10 : py-bodyH;

  ctx.shadowColor = char.color;
  ctx.shadowBlur = 20;
  ctx.fillStyle = char.color + '33';
  ctx.strokeStyle = char.color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(px-15, bodyY, 30, bodyH, 6);
  ctx.fill(); ctx.stroke();

  // Character icon
  ctx.font = gs.isSliding ? '16px sans-serif' : '24px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(char.icon, px, bodyY + bodyH/2);

  // Hover blades / feet glow
  ctx.fillStyle = char.color;
  ctx.globalAlpha=0.8;
  ctx.beginPath();
  ctx.ellipse(px, py+5, 18, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Speed lines from character
  if(gs.speed > 10) {
    for(let i=0;i<4;i++) {
      const lineX = px - 20 - Math.random()*30;
      const lineY = bodyY + Math.random()*bodyH;
      ctx.strokeStyle = char.color;
      ctx.globalAlpha=0.3;
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(lineX, lineY);
      ctx.lineTo(lineX-20, lineY);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ============================================================
// GAME LOOP
// ============================================================
function loop() {
  if(!gameState.running || gameState.paused) return;
  update();
  draw();
  rafId = requestAnimationFrame(loop);
}

// ============================================================
// GAME OVER
// ============================================================
function endGame() {
  const gs = gameState;
  gs.running = false;
  cancelAnimationFrame(rafId);

  const isNewBest = gs.score > gs.bestScore;
  if(isNewBest) localStorage.setItem('neonBest', gs.score);

  setTimeout(() => {
    showScreen('gameover-screen');
    document.getElementById('go-score').textContent = gs.score.toLocaleString();
    document.getElementById('go-dist').textContent = Math.floor(gs.distance)+'M';
    document.getElementById('go-combo').textContent = gs.maxCombo+'x';
    document.getElementById('go-credits').textContent = gs.credits;
    document.getElementById('go-best-label').textContent = isNewBest ? '★ NEW BEST SCORE ★' : '';
  }, 800);
}

// Show first mission on start
setTimeout(()=>{
  if(gameState && gameState.running) showMission('MISSION: COLLECT 5 CREDITS IN A ROW');
}, 2000);

// Boot with title
showScreen('title-screen');
</script>
